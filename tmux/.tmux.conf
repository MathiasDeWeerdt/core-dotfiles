### ── General Settings ─────────────────────
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g default-terminal "screen-256color"

### ── Clipboard (Wayland / wl-clipboard) ───
set -g set-clipboard on
setw -g xterm-keys on
# Copy selection to system clipboard with y in copy-mode
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"
# Copy with Enter as well (keep default behaviour + pipe)
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "wl-copy"

### ── TPM Plugin Manager ───────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-sidebar'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'uhs-robert/tmux-oasis'

### ── Prefix and Keybind Tweaks ────────────
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# C-a n → new window (same dir)
bind-key n new-window -c "#{pane_current_path}"

# C-a q → kill current pane
unbind q
bind-key q kill-pane

# C-a Q → kill current window (Shift-q = bigger kill)
bind-key Q kill-window

# C-a K → kill entire session (Shift-k = destroy everything)
bind-key K kill-session

# C-a R → reload tmux config
bind-key R source-file ~/.tmux.conf \; display-message "Config reloaded"

# C-a d → detach (default, kept for clarity)
bind-key d detach-client

# C-a h → split horizontally (panes stacked, same dir)
bind-key h split-window -v -c "#{pane_current_path}"

# C-a v → split vertically (panes side by side, same dir)
bind-key v split-window -h -c "#{pane_current_path}"

# C-a r → rename current window
unbind ,
bind-key r command-prompt -I "" "rename-window '%%'"

# C-a P → command palette (Ctrl+Shift+P style, fuzzy search)
bind-key P display-popup -E "$HOME/.config/tmux/command-palette"

# TPM plugin shortcuts
bind-key I run '~/.tmux/plugins/tpm/scripts/install_plugins.sh'
bind-key U run '~/.tmux/plugins/tpm/scripts/update_plugin.sh'
bind-key R run '~/.tmux/plugins/tpm/scripts/clean_plugins.sh && ~/.tmux/plugins/tpm/scripts/install_plugins.sh'

### ── tmux-resurrect/continuum ─────────────
set -g @continuum-restore 'on'
# set -g @resurrect-capture-pane-contents 'on'

### ── tmux-fzf (Session/Window Finder) ─────
# FZF fuzzy window switcher: C-a f → type name, enter
bind-key f run-shell '~/.tmux/plugins/tmux-fzf/scripts/window.sh switch'
# FZF full menu (sessions, windows, etc)
bind-key M run-shell '~/.tmux/plugins/tmux-fzf/main.sh'

### ── Status Line Customization ────────────
# set -g status on
# set -g status-interval 2
# set -g status-left '#[fg=cyan]Session: #S '
# set -g status-right '#[fg=yellow]%Y-%m-%d #[fg=green]%H:%M:%S'

### ── tmux-oasis (theme) ───────────────────
set -g @oasis_flavor "midnight"  # midnight_dark; change _dark/_light_1..5

### ── Load TPM Plugins ─────────────────────
run '~/.tmux/plugins/tpm/tpm'

